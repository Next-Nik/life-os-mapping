<!DOCTYPE html>

<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Cormorant+SC:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* ── Site nav integration ── */
    :root {
      --bg-warm: #F5F2EC;
      --gold-rule: rgba(200,146,42,0.20);
      --gold-faint: rgba(200,146,42,0.08);
      --serif-sc: 'Cormorant SC', Georgia, serif;
    }
    .nk-nav { position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--gold-rule); }
    .nk-nav-inner { max-width:1040px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px; }
    .nk-nav-logo img { height:34px;width:auto;display:block; }
    .nk-nav-links { display:flex;align-items:center;gap:28px; }
    .nk-nav-links a { font-family:var(--serif-sc);font-size:13px;letter-spacing:0.10em;color:rgba(15,21,35,0.78);text-decoration:none;transition:color 0.2s; }
    .nk-nav-links a:hover { color:#0F1523; }
    .nk-nav-links a.active { color:#C8922A; }
    .nk-hamburger { display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px; }
    .nk-hamburger span { display:block;width:22px;height:1.5px;background:rgba(15,21,35,0.78);border-radius:1px; }
    .nk-mobile-menu { display:none;flex-direction:column;background:#FFFFFF;border-bottom:1px solid var(--gold-rule);padding:8px 0; }
    .nk-mobile-menu.open { display:flex; }
    .nk-mobile-menu a { font-family:var(--serif-sc);font-size:13px;letter-spacing:0.10em;color:#0F1523;text-decoration:none;padding:14px 32px;border-bottom:1px solid var(--gold-faint); }
    .nk-profile-dot { width:32px;height:32px;border-radius:50%;background:rgba(200,146,42,0.02);border:1.5px solid rgba(200,146,42,0.78);display:flex;align-items:center;justify-content:center;font-family:var(--serif-sc);font-size:13px;font-weight:600;color:#C8922A;text-decoration:none;flex-shrink:0;transition:all 0.2s; }
    .nk-profile-dot:hover { background:rgba(200,146,42,0.08);border-color:rgba(200,146,42,1);transform:translateY(-1px); }

    /* Offset container for fixed nav — handled in style.css */

    @media (max-width:640px) {
      .nk-nav-inner { padding:0 24px; }
      .nk-nav-links { display:none; }
      .nk-hamburger { display:flex; }
    }
  </style>
</head>
